baseURL: "https://dancenitra.github.io/discoveries/"
languageCode: "en-us"
title: "Vault Discoveries"
theme: "hugo-book"
pagination:
  pagerSize: 10
enableRobotsTXT: true
markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
  highlight:
    style: monokai
    lineNos: true
    lineNumbersInTable: true
params:
  description: "Cross-domain syntheses from the vault — bridging neuroscience, agent engineering, finance, complexity science, and software architecture."
  keywords: "cross-domain, AI agents, neuroscience, complexity, finance"
